<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Meu Isqueiro</title>
    <!-- Ícone da aba do navegador (Favicon) gerado em SVG puro -->
    <link rel="icon" href="icon.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@600;800;900&display=swap');

        :root { 
            --wall-color: #fef08a; 
            --floor-color: #fef9c3; 
            --lighter-bg: #dbeafe; 
            --lighter-fill: #3b82f6; 
        }

        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #0f172a; 
            touch-action: none; 
            user-select: none; 
            overflow: hidden; 
            -webkit-user-select: none; 
        }

        /* --- TEXTURAS PREMIUM --- */
        .room-wall { 
            background-color: var(--wall-color); 
            background-image: 
                linear-gradient(rgba(0,0,0,0.04) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.04) 2px, transparent 2px);
            background-size: 30px 30px;
            transition: background-color 0.5s; 
        }
        
        .room-floor { 
            background-color: var(--floor-color); 
            background-image: 
                linear-gradient(to top, rgba(0,0,0,0.15) 0%, transparent 100%),
                repeating-linear-gradient(90deg, transparent, transparent 38px, rgba(0,0,0,0.06) 38px, rgba(0,0,0,0.06) 40px);
            transition: background-color 0.5s; 
            box-shadow: inset 0 10px 15px -10px rgba(0,0,0,0.2);
        }

        .wood-texture {
            background-image: repeating-linear-gradient(to bottom, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 2px, transparent 2px, transparent 8px);
        }

        .metal-cap { 
            background: linear-gradient(135deg, #f9fafb 0%, #9ca3af 40%, #e5e7eb 60%, #6b7280 100%);
            background-image: 
                repeating-linear-gradient(90deg, rgba(255,255,255,0.4) 0px, rgba(255,255,255,0.4) 1px, transparent 1px, transparent 4px),
                linear-gradient(135deg, #f9fafb 0%, #9ca3af 40%, #e5e7eb 60%, #6b7280 100%);
        }

        /* --- SOMBRAS DE ANCORAGEM --- */
        .ground-shadow { position: relative; }
        .ground-shadow::after {
            content: ''; position: absolute; bottom: -10px; left: 5%; width: 90%; height: 16px;
            background: rgba(0,0,0,0.35); border-radius: 50%; filter: blur(3px); z-index: -1;
        }

        /* --- DINÂMICOS DO ISQUEIRO --- */
        .dynamic-lighter-bg { background-color: var(--lighter-bg) !important; transition: background-color 0.5s; }
        .dynamic-lighter-fill { background-color: var(--lighter-fill) !important; transition: background-color 0.5s; }

        /* --- ANIMAÇÕES --- */
        @keyframes flicker { 0%, 100% { transform: scale(1) translateX(-50%); opacity: 0.9; } 25% { transform: scale(1.05) translateX(-52%) rotate(-2deg); opacity: 1; } 50% { transform: scale(0.95) translateX(-48%) rotate(2deg); opacity: 0.8; } 75% { transform: scale(1.02) translateX(-51%) rotate(-1deg); opacity: 0.95; } }
        .flame-active { animation: flicker 0.3s infinite alternate; transform-origin: bottom center; }
        @keyframes breathe { 0%, 100% { transform: scaleY(1); } 50% { transform: scaleY(0.98) translateY(2px); } }
        .breathing { animation: breathe 3s infinite ease-in-out; }
        @keyframes waterDrop { 0% { transform: translateY(-10px) scale(0); opacity: 0; } 50% { transform: translateY(20px) scale(1); opacity: 1; } 100% { transform: translateY(50px) scale(0.5); opacity: 0; } }
        .shower-water { animation: waterDrop 0.6s linear infinite; }
        @keyframes zzz { 0% { transform: translate(0, 0) scale(0.5); opacity: 0; } 50% { opacity: 1; } 100% { transform: translate(20px, -40px) scale(1.5); opacity: 0; } }
        .zzz-anim { animation: zzz 2s infinite linear; }
        @keyframes levelUpAnim { 0% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.2); filter: brightness(1.5); } 100% { transform: scale(1); filter: brightness(1); } }
        .level-up { animation: levelUpAnim 0.8s ease-out; }

        .dirt-overlay { background-image: radial-gradient(circle, rgba(0,0,0,0.8) 10%, transparent 11%), radial-gradient(circle, rgba(0,0,0,0.6) 10%, transparent 11%); background-size: 20px 20px, 30px 30px; background-position: 0 0, 15px 15px; opacity: 0; pointer-events: none; transition: opacity 1s; }

        .progress-bar { transition: width 0.5s ease-out, background-color 0.5s ease-out; }
        .nav-btn { transition: transform 0.1s, color 0.2s; }
        .nav-btn:active { transform: scale(0.90); }
        .nav-btn.active { color: #3b82f6; }
        .action-btn { transition: transform 0.1s; }
        .action-btn:active { transform: scale(0.95); }

        .night-overlay { background-color: rgba(15, 23, 42, 0.85); pointer-events: none; transition: opacity 1s; opacity: 0; }
        .is-sleeping .night-overlay { opacity: 1; pointer-events: auto; }
        .is-sleeping .action-layer { z-index: 50; }

        .shop-scroll::-webkit-scrollbar { width: 6px; }
        .shop-scroll::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .shop-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<!-- O ecrã fica cinza no PC, centralizando a App (max-w-[600px]) que se assemelha a um ecrã de telemóvel largo -->
<body class="h-screen w-screen flex justify-center items-center bg-gray-900">

    <div id="game-app" class="w-full h-full max-w-[600px] bg-white relative flex flex-col overflow-hidden md:shadow-[0_0_50px_rgba(0,0,0,0.5)] md:border-x-4 border-gray-950">
        
        <!-- HEADER (Status, XP, Coins, Shop) -->
        <div class="bg-gray-800 text-white p-2 px-3 flex flex-col z-40 relative shadow-md shrink-0">
            <div class="flex justify-between items-center mb-2">
                <div class="flex items-center gap-2">
                    <div id="level-badge" class="bg-blue-600 text-white font-black text-xs px-2 py-1 rounded border-2 border-blue-400 shadow-sm flex flex-col items-center">
                        <span>NVL</span><span id="level-display" class="text-lg leading-none">1</span>
                    </div>
                    <div class="flex flex-col w-20 sm:w-24">
                        <span class="text-[10px] text-gray-400 font-bold uppercase" id="age-display">Idade: 0 dias</span>
                        <div class="w-full h-2.5 bg-gray-900 rounded-full border border-gray-600 overflow-hidden">
                            <div id="xp-bar" class="h-full bg-cyan-400 transition-all duration-300 w-0"></div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-2 items-center">
                    <div class="flex items-center gap-1 bg-gray-900 px-2 py-1 rounded-full border-2 border-yellow-500 shadow-inner">

                        <span id="coin-display" class="font-black text-md tracking-wider text-yellow-400">0</span>
                    </div>
                    <button onclick="togglePalette()" class="p-1.5 bg-gray-700 hover:bg-gray-600 rounded-full active:scale-95 transition border border-gray-600 shadow-sm">
                        <svg class="w-5 h-5 text-gray-200" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5,12A1.5,1.5 0 0,1 16,10.5A1.5,1.5 0 0,1 17.5,9A1.5,1.5 0 0,1 19,10.5A1.5,1.5 0 0,1 17.5,12M14.5,8A1.5,1.5 0 0,1 13,6.5A1.5,1.5 0 0,1 14.5,5A1.5,1.5 0 0,1 16,6.5A1.5,1.5 0 0,1 14.5,8M9.5,8A1.5,1.5 0 0,1 8,6.5A1.5,1.5 0 0,1 9.5,5A1.5,1.5 0 0,1 11,6.5A1.5,1.5 0 0,1 9.5,8M6.5,12A1.5,1.5 0 0,1 5,10.5A1.5,1.5 0 0,1 6.5,9A1.5,1.5 0 0,1 8,10.5A1.5,1.5 0 0,1 6.5,12M12,3A9,9 0 0,0 3,12A9,9 0 0,0 12,21A1.5,1.5 0 0,0 13.5,19.5C13.5,19.11 13.35,18.76 13.11,18.5C12.88,18.23 12.73,17.88 12.73,17.5A1.5,1.5 0 0,1 14.23,16H16A5,5 0 0,0 21,11C21,6.58 16.97,3 12,3Z"/></svg>
                    </button>
                    <button onclick="openShop(false)" class="p-1.5 px-3 bg-purple-600 hover:bg-purple-500 rounded-full active:scale-95 transition border border-purple-800 font-bold text-xs flex items-center gap-1 shadow-sm">
                        <svg class="w-4 h-4 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M17,18A2,2 0 0,1 19,20A2,2 0 0,1 17,22C15.89,22 15,21.1 15,20C15,18.89 15.89,18 17,18M1,2H4.27L5.21,4H20A1,1 0 0,1 21,5C21,5.17 20.95,5.34 20.88,5.5L17.3,11.97C16.96,12.58 16.3,13 15.55,13H8.1L7.2,14.63L7.17,14.75A0.25,0.25 0 0,0 7.42,15H19V17H7C5.89,17 5,16.1 5,15C5,14.65 5.09,14.32 5.24,14.04L6.6,11.59L3,4H1V2M7,18A2,2 0 0,1 9,20A2,2 0 0,1 7,22C5.89,22 5,21.1 5,20C5,18.89 5.89,18 7,18Z"/></svg> LOJA
                    </button>
                </div>
            </div>
            
            <div class="flex justify-between items-center bg-gray-100 p-1.5 rounded-lg border border-gray-300 shadow-inner">
                <div class="flex flex-col items-center w-1/5"><svg class="w-4 h-4 text-blue-500 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12,2C12,2 5,10 5,15C5,18.86 8.14,22 12,22C15.86,22 19,18.86 19,15C19,10 12,2 12,2Z"/></svg><div class="w-full h-1.5 bg-gray-300 rounded-full overflow-hidden"><div id="bar-fuel" class="h-full bg-blue-500 progress-bar w-full"></div></div></div>
                <div class="flex flex-col items-center w-1/5"><svg class="w-4 h-4 text-green-500 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M7,22A2,2 0 0,1 5,20V19A2,2 0 0,1 7,17H17A2,2 0 0,1 19,19V20A2,2 0 0,1 17,22H7M7,15A2,2 0 0,1 5,13V12A2,2 0 0,1 7,10H17A2,2 0 0,1 19,12V13A2,2 0 0,1 17,15H7Z"/></svg><div class="w-full h-1.5 bg-gray-300 rounded-full overflow-hidden"><div id="bar-clean" class="h-full bg-green-500 progress-bar w-full"></div></div></div>
                <div class="flex flex-col items-center w-1/5"><svg class="w-4 h-4 text-yellow-500 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M11,15H6L13,1V9H18L11,23V15Z"/></svg><div class="w-full h-1.5 bg-gray-300 rounded-full overflow-hidden"><div id="bar-energy" class="h-full bg-yellow-400 progress-bar w-full"></div></div></div>
                <div class="flex flex-col items-center w-1/5"><svg class="w-4 h-4 text-pink-500 mb-0.5" fill="currentColor" viewBox="0 0 24 24"><path d="M22,12A10,10 0 0,1 12,22A10,10 0 0,1 2,12A10,10 0 0,1 12,2A10,10 0 0,1 22,12M15.5,8A1.5,1.5 0 0,0 14,9.5A1.5,1.5 0 0,0 15.5,11A1.5,1.5 0 0,0 17,9.5A1.5,1.5 0 0,0 15.5,8M9.5,11A1.5,1.5 0 0,0 11,9.5A1.5,1.5 0 0,0 9.5,8A1.5,1.5 0 0,0 8,9.5A1.5,1.5 0 0,0 9.5,11M12,17.5C14.33,17.5 16.3,16.04 17.11,14H6.89C7.7,16.04 9.67,17.5 12,17.5Z"/></svg><div class="w-full h-1.5 bg-gray-300 rounded-full overflow-hidden"><div id="bar-fun" class="h-full bg-pink-500 progress-bar w-full"></div></div></div>
            </div>
        </div>

        <!-- AMBIENTES & CENA (ESTRUTURA RESPONSIVA PERFEITA) -->
        <div class="flex-1 relative flex flex-col w-full overflow-hidden">
            
            <!-- PAREDE (60% do ecrã) -->
            <div class="h-[60%] w-full relative room-wall border-b-[6px] border-black/10 z-0">
                <div id="room-title" class="absolute top-4 left-1/2 -translate-x-1/2 bg-white/80 px-5 py-1 rounded-full font-black text-gray-800 text-sm tracking-widest uppercase shadow-md z-10 backdrop-blur-md border border-white/50">Cozinha</div>
                <div id="thought-bubble" class="absolute top-14 left-1/2 -translate-x-1/2 bg-white px-3 py-2 rounded-xl text-xs font-bold text-gray-700 shadow-lg opacity-0 transition-opacity duration-500 z-10 pointer-events-none before:content-[''] before:absolute before:-bottom-2 before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-white">Estou feliz!</div>
            </div>
            
            <!-- CHÃO (40% do ecrã) -->
            <div class="h-[40%] w-full relative room-floor z-0"></div>

            <div class="absolute inset-0 night-overlay z-30 flex justify-center items-center">
                <div id="zzz-container" class="hidden absolute top-20 right-20 text-blue-300 font-black text-4xl"><span class="absolute zzz-anim" style="animation-delay: 0s;">Z</span><span class="absolute zzz-anim text-3xl" style="animation-delay: 0.5s; right: -15px; top: -15px;">z</span><span class="absolute zzz-anim text-2xl" style="animation-delay: 1s; right: -25px; top: -25px;">z</span></div>
            </div>

            <!-- CAMADA DOS MÓVEIS (Ancorados à linha exata que divide a parede do chão, em h-[60%]) -->
            <div id="furniture-container" class="absolute top-0 left-0 w-full h-[60%] z-10 pointer-events-none">
                
                <!-- COZINHA -->
                <div id="room-kitchen" class="furniture-group w-full h-full relative">
                    <!-- Geladeira (bottom-0 e translate-y empurra-a para dentro do chão de forma perspetiva) -->
                    <div id="fridge" onclick="toggleFridge()" class="absolute bottom-0 translate-y-6 left-[8%] w-[100px] h-[200px] sm:w-28 sm:h-56 bg-gray-100 border-4 border-gray-400 rounded-t-xl flex flex-col shadow-lg pointer-events-auto cursor-pointer transition-all ground-shadow" style="perspective: 500px;">
                        <div class="absolute inset-0 flex flex-col p-2 gap-2 z-0 pt-6">
                            <div class="w-full h-2 bg-sky-200 mt-2"></div><div class="w-full h-2 bg-sky-200 mt-6"></div>
                            <div class="flex gap-1 absolute bottom-2"><div class="w-4 h-6 bg-red-400 rounded-sm"></div><div class="w-4 h-8 bg-green-400 rounded-sm"></div></div>
                        </div>
                        <div id="fridge-top" class="h-[40%] w-full relative bg-gradient-to-r from-gray-100 to-gray-300 border-b-4 border-gray-400 transition-all duration-500 origin-left z-10 rounded-t-lg">
                            <div class="absolute right-2 top-1/2 -translate-y-1/2 w-2 h-8 bg-gray-400 rounded-full"></div>
                        </div>
                        <div id="fridge-bottom" class="flex-1 w-full relative bg-gradient-to-r from-gray-100 to-gray-300 transition-all duration-500 origin-left z-10">
                            <div class="absolute right-2 top-4 w-2 h-12 bg-gray-400 rounded-full"></div>
                        </div>
                        <div class="absolute -bottom-3 left-2 w-3 h-3 bg-gray-500"></div><div class="absolute -bottom-3 right-2 w-3 h-3 bg-gray-500"></div>
                    </div>
                    <!-- Balcão -->
                    <div class="absolute bottom-0 translate-y-4 right-[5%] w-[120px] h-[80px] sm:w-36 sm:h-28 bg-orange-200 border-4 border-orange-400 rounded-t-lg shadow-lg ground-shadow wood-texture">
                        <div class="w-full h-4 bg-gray-300 border-b-4 border-orange-400 rounded-t-lg"></div><div class="w-full mt-2 h-1 bg-orange-300"></div><div class="w-full mt-2 h-1 bg-orange-300"></div>
                        <div class="absolute -bottom-3 left-2 w-3 h-3 bg-orange-500"></div><div class="absolute -bottom-3 right-2 w-3 h-3 bg-orange-500"></div>
                    </div>
                </div>
                
                <!-- BANHEIRO -->
                <div id="room-bathroom" class="furniture-group w-full h-full relative hidden">
                    <div class="absolute bottom-0 translate-y-4 left-1/2 -translate-x-1/2 w-56 sm:w-64 h-20 sm:h-24 bg-white border-4 border-gray-300 rounded-b-full shadow-xl flex items-end justify-center pb-2 ground-shadow">
                        <div class="absolute -bottom-2 left-6 w-4 h-4 bg-gray-300 rounded-full"></div><div class="absolute -bottom-2 right-6 w-4 h-4 bg-gray-300 rounded-full"></div>
                    </div>
                    <div class="absolute bottom-20 sm:bottom-24 right-[30%] w-4 h-24 bg-gray-300 border-x-2 border-gray-500"></div><div class="absolute bottom-[104px] sm:bottom-[120px] right-[30%] w-16 h-4 bg-gray-300 border-y-2 border-l-2 border-gray-500 rounded-l-full -ml-12"></div><div class="absolute bottom-[104px] sm:bottom-[120px] right-[35%] w-8 h-4 bg-gray-400 rounded-b-full border-2 border-gray-600"></div>
                    <div id="shower-fx" class="absolute bottom-6 right-[35%] w-8 h-32 hidden"><div class="w-1 h-3 bg-blue-400 rounded-full absolute left-1 shower-water" style="animation-delay: 0s;"></div><div class="w-1 h-3 bg-blue-400 rounded-full absolute left-4 shower-water" style="animation-delay: 0.2s;"></div><div class="w-1 h-3 bg-blue-400 rounded-full absolute left-7 shower-water" style="animation-delay: 0.4s;"></div></div>
                </div>
                
                <!-- QUARTO -->
                <div id="room-bedroom" class="furniture-group w-full h-full relative hidden pointer-events-auto">
                    <!-- GUARDA-ROUPA FÍSICO (Ancorado no bottom-0 com translate-y) -->
                    <div onclick="openShop(true)" class="absolute bottom-0 translate-y-8 left-[6%] w-[110px] sm:w-32 h-[220px] sm:h-[260px] bg-[#78350f] border-4 border-[#451a03] rounded-t-lg shadow-2xl cursor-pointer active:scale-[0.98] transition-transform flex flex-col relative group hover:brightness-110 wood-texture ground-shadow">
                        <div class="w-full bg-[#451a03] text-amber-200 text-[9px] text-center font-bold tracking-widest py-0.5 border-b-2 border-black/50 z-10">ROUPAS</div>
                        <div class="flex-1 flex w-full">
                            <div class="w-1/2 h-full border-r-2 border-black/40 bg-[#92400e]/80 relative"><div class="absolute top-1/2 right-1 -translate-y-1/2 w-2 h-7 bg-yellow-500 rounded-full border border-yellow-700 shadow-sm"></div></div>
                            <div class="w-1/2 h-full bg-[#92400e]/80 relative"><div class="absolute top-1/2 left-1 -translate-y-1/2 w-2 h-7 bg-yellow-500 rounded-full border border-yellow-700 shadow-sm"></div></div>
                        </div>
                        <div class="absolute -bottom-3 left-2 w-3 h-3 bg-[#451a03]"></div><div class="absolute -bottom-3 right-2 w-3 h-3 bg-[#451a03]"></div>
                    </div>
                    
                    <div id="bedroom-window" class="absolute top-[10%] right-[10%] w-16 sm:w-20 h-20 sm:h-24 border-4 border-gray-600 bg-sky-400 rounded-t-xl overflow-hidden flex flex-wrap pointer-events-none transition-colors duration-1000 shadow-inner">
                        <div class="w-1/2 h-1/2 border-r-2 border-b-2 border-gray-600 relative"><div id="win-star1" class="hidden absolute top-1 left-2 w-1 h-1 bg-white rounded-full shadow-[0_0_2px_#fff]"></div></div>
                        <div class="w-1/2 h-1/2 border-b-2 border-gray-600 relative"><div id="win-sun-moon" class="absolute top-2 right-2 w-5 h-5 sm:w-6 sm:h-6 bg-yellow-300 rounded-full transition-all duration-1000 shadow-[0_0_10px_#fde047]"></div></div>
                        <div class="w-1/2 h-1/2 border-r-2 border-gray-600"></div>
                        <div class="w-1/2 h-1/2 relative"><div id="win-star2" class="hidden absolute bottom-2 left-2 w-1 h-1 bg-white rounded-full shadow-[0_0_2px_#fff]"></div></div>
                    </div>
                    <!-- CAMA (Ancorada no bottom-0, mesma linha exata do armário) -->
                    <div class="absolute bottom-0 translate-y-4 right-[5%] w-36 sm:w-44 h-16 sm:h-20 bg-indigo-500 border-4 border-indigo-800 rounded-t-xl rounded-bl-md flex items-end shadow-xl pointer-events-none ground-shadow">
                        <div class="absolute top-2 right-4 w-10 sm:w-14 h-6 sm:h-8 bg-white border-2 border-gray-300 rounded-lg shadow-sm z-10"></div><div class="w-3/4 h-full bg-indigo-400 border-r-4 border-indigo-800 rounded-tl-xl rounded-bl-md shadow-inner"></div>
                        <div class="absolute -bottom-2 left-2 w-3 h-2 bg-indigo-900"></div><div class="absolute -bottom-2 right-2 w-3 h-2 bg-indigo-900"></div>
                    </div>
                </div>
                
                <!-- SALA -->
                <div id="room-livingroom" class="furniture-group w-full h-full relative hidden pointer-events-auto">
                    <div class="absolute bottom-0 translate-y-10 left-1/2 -translate-x-1/2 w-64 sm:w-72 h-12 sm:h-14 bg-red-400/80 rounded-[100%] shadow-[inset_0_4px_8px_rgba(0,0,0,0.1)] border-2 border-red-500/40 pointer-events-none backdrop-blur-sm"></div>
                    <!-- RACK -->
                    <div class="absolute bottom-0 translate-y-4 left-[8%] w-[120px] sm:w-36 h-[40px] sm:h-14 bg-amber-800 border-4 border-amber-950 rounded-md shadow-lg flex justify-center items-start pointer-events-none ground-shadow wood-texture">
                        <div class="w-8 sm:w-10 h-4 sm:h-5 bg-gray-800 -mt-4 sm:-mt-5 border-x-2 border-t-2 border-gray-900"></div>
                        <div onclick="toggleTV()" class="absolute bottom-full mb-3 w-[100px] sm:w-32 h-[75px] sm:h-24 bg-gray-900 border-[5px] border-black rounded-lg flex items-center justify-center overflow-hidden shadow-2xl pointer-events-auto cursor-pointer group">
                            <div class="absolute top-0 right-0 w-full h-full bg-gradient-to-bl from-white/20 to-transparent z-10 pointer-events-none"></div>
                            <div id="tv-screen" class="w-full h-full bg-black transition-colors duration-300 group-active:scale-95"></div>
                            <div class="absolute bottom-1 right-1 w-1.5 h-1.5 bg-red-500 rounded-full z-20 shadow-[0_0_4px_#ef4444]"></div>
                        </div>
                        <div class="absolute -bottom-2 left-2 w-3 h-2 bg-amber-950"></div><div class="absolute -bottom-2 right-2 w-3 h-2 bg-amber-950"></div>
                    </div>
                </div>
            </div>

            <!-- PERSONAGEM ISQUEIRO (Ancorado na linha exata de horizonte) -->

        function gameTick() {

            const grid = document.getElementById('shop-grid'); grid.innerHTML = '';

        // --- HUB DE MINIGAMES ---
        function openMinigamesHub() { if(!isSleeping) document.getElementById('minigames-hub').classList.remove('hidden'); }
        function closeMinigamesHub() { document.getElementById('minigames-hub').classList.add('hidden'); }

        // --- MOTOR DE MINIGAMES ---
        const gameScreen = document.getElementById('game-canvas-screen'), canvas = document.getElementById('gameCanvas'), ctx = canvas.getContext('2d');
        let mgReq, mgScore = 0, mgCoins = 0, mgActive = false;
        
        let pgPlayer = { width: 34, height: 50, x: 0, y: 0 }; 
        let pongPlayer = { x: 0, y: 0, w: 60, h: 14 }; 
        let pongAi = { x: 0, y: 30, w: 60, h: 14, speed: 4 }; 
        let rcPlayer = { x: 0, y: 0, w: 28, h: 46 }; 
        let snkDir = 'UP'; 
        let keys = { left: false, right: false }; // Keyboard state
        
        function handleGlobalTouch(clientX, clientY) {
            const rect = canvas.getBoundingClientRect(); 
            const scaleX = canvas.width / rect.width;
            let x = (clientX - rect.left) * scaleX;
            if (activeMinigame === 'pega-gas') { let px = x - (pgPlayer.width/2); pgPlayer.x = Math.max(0, Math.min(px, canvas.width - pgPlayer.width)); }
            if (activeMinigame === 'pong') { let px = x - (pongPlayer.w/2); pongPlayer.x = Math.max(0, Math.min(px, canvas.width - pongPlayer.w)); }
            if (activeMinigame === 'racing') { let px = x - (rcPlayer.w/2); rcPlayer.x = Math.max(0, Math.min(px, canvas.width - rcPlayer.w)); }
            if (activeMinigame === 'flappy-chama' && eType === 'start') { flPlayer.velocity = flPlayer.jump; }
        }
        
        let eType = '';
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); eType = 'start'; handleGlobalTouch(e.touches[0].clientX, e.touches[0].clientY); 
            if(activeMinigame === 'tic-tac-toe') tttTouch(e.touches[0].clientX, e.touches[0].clientY, true);
            if(activeMinigame === 'sudoku') sdkTouch(e.touches[0].clientX, e.touches[0].clientY, true);
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => { e.preventDefault(); eType = 'move'; handleGlobalTouch(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
        
        canvas.addEventListener('mousedown', (e) => { eType = 'start'; handleGlobalTouch(e.clientX, e.clientY);
            if(activeMinigame === 'tic-tac-toe') tttTouch(e.clientX, e.clientY, false);
            if(activeMinigame === 'sudoku') sdkTouch(e.clientX, e.clientY, false);
        });
        canvas.addEventListener('mousemove', (e) => { if(e.buttons > 0 || activeMinigame !== 'flappy-chama') { eType = 'move'; handleGlobalTouch(e.clientX, e.clientY); } });

        // Suporte Teclado PC
        window.addEventListener('keydown', (e) => {
            if(!mgActive) return;
            if(activeMinigame === 'tetris') {
                if(e.key === 'ArrowLeft' || e.key === 'a') btnLeft(); if(e.key === 'ArrowRight' || e.key === 'd') btnRight();
                if(e.key === 'ArrowUp' || e.key === 'w') btnUp(); if(e.key === 'ArrowDown' || e.key === 's') btnDown();
            }
            else if(activeMinigame === 'snake') {
                if((e.key === 'ArrowLeft' || e.key === 'a') && snkDir !== 'RIGHT') snkDir = 'LEFT'; if((e.key === 'ArrowRight' || e.key === 'd') && snkDir !== 'LEFT') snkDir = 'RIGHT';
                if((e.key === 'ArrowUp' || e.key === 'w') && snkDir !== 'DOWN') snkDir = 'UP'; if((e.key === 'ArrowDown' || e.key === 's') && snkDir !== 'UP') snkDir = 'DOWN';
            }
            else if(activeMinigame === 'flappy-chama') { if(e.key === ' ' || e.key === 'ArrowUp' || e.key === 'w') flPlayer.velocity = flPlayer.jump; }
            else if(activeMinigame === 'pega-gas' || activeMinigame === 'pong' || activeMinigame === 'racing') {
                if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = true; if(e.key === 'ArrowRight' || e.key === 'd') keys.right = true;
            }
        });
        window.addEventListener('keyup', (e) => {
            if(e.key === 'ArrowLeft' || e.key === 'a') keys.left = false; if(e.key === 'ArrowRight' || e.key === 'd') keys.right = false;
        });

        function resizeCanvas() {
            canvas.width = canvas.parentElement.clientWidth; canvas.height = canvas.parentElement.clientHeight;

            else if(gameType === 'sudoku') { titleEl.innerText = "SUDOKU"; descEl.innerHTML = "Toque para alternar cores.<br><span class='text-yellow-400'>10 Moedas ao fechar!</span>"; }
            else if(gameType === 'tetris') { titleEl.innerText = "TETRIS"; descEl.innerHTML = "Use botões ou Setas no PC.<br><span class='text-yellow-400'>1 Moeda / Linha.</span>"; document.getElementById('dpad-controls').classList.remove('hidden'); }
            else if(gameType === 'racing') { titleEl.innerText = "CORRIDA TURBO"; descEl.innerHTML = "Deslize ou use Setas para desviar.<br><span class='text-yellow-400'>1 Moeda / 500m.</span>"; }
            else if(gameType === 'snake') { titleEl.innerText = "COBRINHA GÁS"; descEl.innerHTML = "Use botões ou Setas/WASD.<br><span class='text-yellow-400'>1 Moeda / 2 Comidas.</span>"; document.getElementById('dpad-controls').classList.remove('hidden'); document.getElementById('btn-up').innerText = '^'; }

            document.getElementById('game-start-overlay').classList.remove('hidden'); document.getElementById('game-over-overlay').classList.add('hidden');

        function triggerGameOver(win=false, customTitle="FIM!") {

        function drawLighterAvatar(x, y, w, h, overrideColor=null) {
            ctx.fillStyle = '#9ca3af'; ctx.fillRect(x, y, w, h*0.25); 
            ctx.fillStyle = overrideColor || getComputedStyle(document.documentElement).getPropertyValue('--lighter-fill').trim() || '#3b82f6'; 
            ctx.fillRect(x, y + h*0.25, w, h*0.75); ctx.strokeStyle = '#1f2937'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
            ctx.fillStyle = '#ff7a00'; ctx.beginPath(); ctx.moveTo(x + w/2, y - h*0.3); ctx.lineTo(x + w*0.2, y); ctx.lineTo(x + w*0.8, y); ctx.fill();
        }
        function drawPaddle(x, y, w, h, isPlayer) {
            ctx.fillStyle = '#b45309'; ctx.fillRect(x + w/2 - 4, isPlayer ? y + h : y - 10, 8, 10); 
            ctx.fillStyle = isPlayer ? '#3b82f6' : '#ef4444'; ctx.beginPath(); ctx.roundRect(x, y, w, h, 6); ctx.fill();
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2; ctx.stroke();
        }

        // ================= 1. PEGA GÁS =================
        let pgItems;
        function initPegaGas() { pgPlayer.x = canvas.width/2 - pgPlayer.width/2; pgItems = []; pgLoop(); }
        function pgLoop() {
            if (!mgActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); 
            if(keys.left) pgPlayer.x -= 8; if(keys.right) pgPlayer.x += 8;
            pgPlayer.x = Math.max(0, Math.min(pgPlayer.x, canvas.width - pgPlayer.width));
            drawLighterAvatar(pgPlayer.x, pgPlayer.y, pgPlayer.width, pgPlayer.height);
            if (Math.random() < 0.05 + (mgScore*0.001)) { pgItems.push({ x: Math.random()*(canvas.width-20), y: -20, width: 20, height: 20, speed: 4+Math.random()*4+(mgScore*0.1), type: Math.random()>0.3?'gas':'water' }); }
            for (let i = pgItems.length - 1; i >= 0; i--) {
                let item = pgItems[i]; item.y += item.speed;
                if (item.type === 'gas') { ctx.fillStyle = '#60a5fa'; ctx.fillRect(item.x, item.y, item.width, item.height); ctx.strokeStyle = '#2563eb'; ctx.lineWidth=2; ctx.strokeRect(item.x, item.y, item.width, item.height); } else { ctx.fillStyle = '#9ca3af'; ctx.beginPath(); ctx.arc(item.x+item.width/2, item.y+item.height/2, item.width/2, 0, Math.PI*2); ctx.fill(); ctx.strokeStyle = '#4b5563'; ctx.lineWidth=2; ctx.stroke(); }
                if (item.x < pgPlayer.x+pgPlayer.width && item.x+item.width > pgPlayer.x && item.y < pgPlayer.y+pgPlayer.height && item.height+item.y > pgPlayer.y) {
                    if (item.type === 'gas') { mgScore++; if(mgScore%5===0) mgCoins++; document.getElementById('game-score').innerText = mgScore; document.getElementById('game-coins').innerText = mgCoins; pgItems.splice(i, 1); } else { triggerGameOver(); return; }
                } else if (item.y > canvas.height) { pgItems.splice(i, 1); }
            }
            mgReq = requestAnimationFrame(pgLoop);
        }

        // ================= 2. FLAPPY =================
        let flPlayer, flPipes, flFrames;
        function initFlappy() { flPlayer = { x: 50, y: canvas.height/2, width: 26, height: 40, velocity: 0, gravity: 0.6, jump: -9 }; flPipes = []; flFrames = 0; flLoop(); }
        function flLoop() {
            if (!mgActive) return; ctx.clearRect(0, 0, canvas.width, canvas.height); flFrames++;
            flPlayer.velocity += flPlayer.gravity; flPlayer.y += flPlayer.velocity; drawLighterAvatar(flPlayer.x, flPlayer.y, flPlayer.width, flPlayer.height);
            if(flPlayer.y+flPlayer.height >= canvas.height || flPlayer.y <= 0) { triggerGameOver(); return; }
            if (flFrames % 100 === 0) { let gap = 150 - Math.min(60, mgScore*2); let topHeight = Math.random()*(canvas.height-gap-50)+20; flPipes.push({ x: canvas.width, width: 40, topHeight: topHeight, gap: gap, passed: false }); }
            for (let i = flPipes.length - 1; i >= 0; i--) {
                let p = flPipes[i]; p.x -= 3.5; ctx.fillStyle = '#16a34a'; ctx.strokeStyle = '#14532d'; ctx.lineWidth = 3; ctx.fillRect(p.x, 0, p.width, p.topHeight); ctx.strokeRect(p.x, 0, p.width, p.topHeight); ctx.fillRect(p.x, p.topHeight+p.gap, p.width, canvas.height); ctx.strokeRect(p.x, p.topHeight+p.gap, p.width, canvas.height);
                if (flPlayer.x < p.x+p.width && flPlayer.x+flPlayer.width > p.x && (flPlayer.y < p.topHeight || flPlayer.y+flPlayer.height > p.topHeight+p.gap)) { triggerGameOver(); return; }
                if(p.x+p.width < flPlayer.x && !p.passed) { p.passed = true; mgScore++; if(mgScore%2===0) mgCoins++; document.getElementById('game-score').innerText = mgScore; document.getElementById('game-coins').innerText = mgCoins; }
                if(p.x+p.width < 0) flPipes.splice(i, 1);
            }
            mgReq = requestAnimationFrame(flLoop);
        }

        // ================= 3. TÊNIS DE MESA =================
        let pongBall;
        function initPong() { pongBall = { x: canvas.width/2, y: canvas.height/2, r: 8, dx: 4*(Math.random()>0.5?1:-1), dy: 5 }; pongLoop(); }
        function pongLoop() {
            if (!mgActive) return; 
            if(keys.left) pongPlayer.x -= 10; if(keys.right) pongPlayer.x += 10; pongPlayer.x = Math.max(10, Math.min(pongPlayer.x, canvas.width - pongPlayer.w - 10));

            ctx.fillStyle = '#166534'; ctx.fillRect(0,0, canvas.width, canvas.height); 
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 4; ctx.strokeRect(10, 10, canvas.width-20, canvas.height-20); 
            ctx.beginPath(); ctx.setLineDash([8, 8]); ctx.moveTo(10, canvas.height/2); ctx.lineTo(canvas.width-10, canvas.height/2); ctx.stroke(); ctx.setLineDash([]); 
            
            pongBall.x += pongBall.dx; pongBall.y += pongBall.dy;
            if(pongBall.x - pongBall.r < 10 || pongBall.x + pongBall.r > canvas.width-10) pongBall.dx *= -1; 
            
            if(pongAi.x + pongAi.w/2 < pongBall.x) pongAi.x += pongAi.speed;
            if(pongAi.x + pongAi.w/2 > pongBall.x) pongAi.x -= pongAi.speed;
            pongAi.x = Math.max(10, Math.min(pongAi.x, canvas.width - pongAi.w - 10));

            if(pongBall.y + pongBall.r > pongPlayer.y && pongBall.x > pongPlayer.x && pongBall.x < pongPlayer.x + pongPlayer.w) {
                pongBall.dy = -(Math.abs(pongBall.dy) + 0.2); pongBall.y = pongPlayer.y - pongBall.r;
                pongBall.dx = ((pongBall.x - (pongPlayer.x + pongPlayer.w/2)) / (pongPlayer.w/2)) * 6;
            }
            if(pongBall.y - pongBall.r < pongAi.y + pongAi.h && pongBall.x > pongAi.x && pongBall.x < pongAi.x + pongAi.w) {
                pongBall.dy = Math.abs(pongBall.dy); pongBall.y = pongAi.y + pongAi.h + pongBall.r;
            }

            if(pongBall.y < 0) { 
                mgScore++; mgCoins++; document.getElementById('game-score').innerText = mgScore; document.getElementById('game-coins').innerText = mgCoins; 
                pongBall = { x: canvas.width/2, y: canvas.height/2, r: 8, dx: 5*(Math.random()>0.5?1:-1), dy: 5 }; pongAi.speed += 0.5; 
            } else if (pongBall.y > canvas.height) { triggerGameOver(); return; }

            drawPaddle(pongPlayer.x, pongPlayer.y, pongPlayer.w, pongPlayer.h, true); drawPaddle(pongAi.x, pongAi.y, pongAi.w, pongAi.h, false);
            ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(pongBall.x, pongBall.y, pongBall.r, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = 'rgba(0,0,0,0.15)'; ctx.beginPath(); ctx.arc(pongBall.x-2, pongBall.y+2, pongBall.r-2, 0, Math.PI*2); ctx.fill(); 
            mgReq = requestAnimationFrame(pongLoop);
        }

        // ================= 4. JOGO DA VELHA =================
        let tttBoard, tttTurn;
        function initTicTacToe() { tttBoard = [0,0,0, 0,0,0, 0,0,0]; tttTurn = 1; tttLoop(); }
        function tttLoop() {
            if(!mgActive) return; ctx.clearRect(0,0, canvas.width, canvas.height);
            let s = Math.min(canvas.width, canvas.height) * 0.9; let ox = (canvas.width - s)/2, oy = (canvas.height - s)/2;
            ctx.save(); ctx.translate(ox, oy); ctx.strokeStyle = '#0284c7'; ctx.lineWidth = 4;
            for(let i=1; i<3; i++) { ctx.beginPath(); ctx.moveTo(i*(s/3), 0); ctx.lineTo(i*(s/3), s); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, i*(s/3)); ctx.lineTo(s, i*(s/3)); ctx.stroke(); }
            for(let i=0; i<9; i++) { if(tttBoard[i] !== 0) { drawLighterAvatar((i%3)*(s/3) + (s/3)*0.2, Math.floor(i/3)*(s/3) + (s/3)*0.1, (s/3)*0.6, (s/3)*0.8, tttBoard[i] === 1 ? '#3b82f6' : '#ef4444'); } }
            ctx.restore(); mgReq = requestAnimationFrame(tttLoop);
        }
        function checkTTTWin(b) { const l=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; for(let x of l) { if(b[x[0]] && b[x[0]] === b[x[1]] && b[x[0]] === b[x[2]]) return b[x[0]]; } return !b.includes(0) ? -1 : 0; }
        function tttTouch(clientX, clientY, isTouch) {
            if(tttTurn !== 1) return;
            const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width;
            let x = (clientX - rect.left)*scaleX, y = (clientY - rect.top)*scaleX;
            let s = Math.min(canvas.width, canvas.height)*0.9; let ox = (canvas.width-s)/2, oy = (canvas.height-s)/2;
            if(x < ox || x > ox+s || y < oy || y > oy+s) return; let idx = Math.floor((y-oy)/(s/3))*3 + Math.floor((x-ox)/(s/3));
            if(tttBoard[idx] === 0) {
                tttBoard[idx] = 1; let w = checkTTTWin(tttBoard);
                if(w===1) { mgCoins+=5; triggerGameOver(true, "GANHOU!"); return; } else if(w===-1) { triggerGameOver(false, "EMPATE!"); return; }
                tttTurn = 2; setTimeout(() => {
                    let e = []; tttBoard.forEach((v, i) => { if(v===0) e.push(i); });
                    if(e.length>0) { tttBoard[e[Math.floor(Math.random()*e.length)]] = 2; let w2 = checkTTTWin(tttBoard); if(w2===2) { triggerGameOver(false, "PERDEU!"); return; } else if(w2===-1) { triggerGameOver(false, "EMPATE!"); return; } tttTurn = 1; }
                }, 400);
            }
        }

        // ================= 5. SUDOKU =================
        let sdkBoard, sdkFixed; const sdkColors = {1: '#3b82f6', 2: '#ef4444', 3: '#22c55e', 4: '#eab308'};
        function initSudoku() { sdkBoard = [1,0,0,4, 0,2,3,0, 0,3,2,0, 4,0,0,1]; sdkFixed = [true,false,false,true, false,true,true,false, false,true,true,false, true,false,false,true]; sdkLoop(); }
        function sdkLoop() {
            if(!mgActive) return; ctx.clearRect(0,0, canvas.width, canvas.height);
            let s = Math.min(canvas.width, canvas.height) * 0.9; let ox = (canvas.width - s)/2, oy = (canvas.height - s)/2; ctx.save(); ctx.translate(ox, oy); ctx.strokeStyle = '#0284c7';
            for(let i=0; i<=4; i++) { ctx.lineWidth = (i%2===0)?5:2; ctx.beginPath(); ctx.moveTo(i*(s/4), 0); ctx.lineTo(i*(s/4), s); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, i*(s/4)); ctx.lineTo(s, i*(s/4)); ctx.stroke(); }
            for(let i=0; i<16; i++) {
                if(sdkFixed[i]) { ctx.fillStyle = 'rgba(0,0,0,0.1)'; ctx.fillRect((i%4)*(s/4), Math.floor(i/4)*(s/4), s/4, s/4); }
                if(sdkBoard[i] !== 0) drawLighterAvatar((i%4)*(s/4) + (s/4)*0.2, Math.floor(i/4)*(s/4) + (s/4)*0.1, (s/4)*0.6, (s/4)*0.8, sdkColors[sdkBoard[i]]);
            }
            ctx.restore(); mgReq = requestAnimationFrame(sdkLoop);
        }
        function sdkTouch(clientX, clientY, isTouch) {
            const rect = canvas.getBoundingClientRect(); const scaleX = canvas.width / rect.width;
            let x = (clientX - rect.left)*scaleX, y = (clientY - rect.top)*scaleX;
            let s = Math.min(canvas.width, canvas.height)*0.9; let ox = (canvas.width-s)/2, oy = (canvas.height-s)/2;
            if(x < ox || x > ox+s || y < oy || y > oy+s) return; let idx = Math.floor((y-oy)/(s/4))*4 + Math.floor((x-ox)/(s/4));
            if(!sdkFixed[idx]) { sdkBoard[idx] = (sdkBoard[idx]+1)%5; if(!sdkBoard.includes(0)) {
                let b = [sdkBoard.slice(0,4), sdkBoard.slice(4,8), sdkBoard.slice(8,12), sdkBoard.slice(12,16)], v = true;
                for(let i=0; i<4; i++) { if(new Set(b[i]).size<4 || new Set([b[0][i], b[1][i], b[2][i], b[3][i]]).size<4) v = false; }
                for(let r=0; r<4; r+=2) for(let c=0; c<4; c+=2) if(new Set([b[r][c], b[r][c+1], b[r+1][c], b[r+1][c+1]]).size<4) v = false;
                if(v) { mgCoins+=10; triggerGameOver(true, "PERFEITO!"); }
            } }
        }

        // ================= 6. TETRIS =================
        let tetBoard, tetPiece, tetX, tetY, tetFrames, tetScale;
        const tet = [{s: [[1,1,1,1]], c: '#3b82f6'}, {s: [[1,1],[1,1]], c: '#eab308'}, {s: [[0,1,0],[1,1,1]], c: '#a855f7'}, {s: [[1,1,0],[0,1,1]], c: '#ef4444'}, {s: [[0,1,1],[1,1,0]], c: '#22c55e'}, {s: [[1,0,0],[1,1,1]], c: '#f97316'}];
        function initTetris() { tetBoard = Array(20).fill().map(()=>Array(10).fill(0)); tetFrames=0; calcTetrisScale(); spawnTetPiece(); tetLoop(); }
        function calcTetrisScale() { tetScale = Math.min(canvas.width/12, canvas.height/22); }
        function spawnTetPiece() { let t = tet[Math.floor(Math.random()*tet.length)]; tetPiece = {s: t.s, c: t.c}; tetX = 3; tetY = 0; if(tetCol()) triggerGameOver(); }
        function tetCol(ox=0, oy=0, s=tetPiece.s) { for(let r=0; r<s.length; r++) for(let c=0; c<s[r].length; c++) if(s[r][c]) { let nx = tetX+c+ox, ny = tetY+r+oy; if(nx<0||nx>=10||ny>=20||(ny>=0&&tetBoard[ny][nx])) return true; } return false; }
        function tetMerge() {
            for(let r=0; r<tetPiece.s.length; r++) for(let c=0; c<tetPiece.s[r].length; c++) if(tetPiece.s[r][c] && tetY+r>=0) tetBoard[tetY+r][tetX+c] = tetPiece.c;
            let l=0; for(let r=19; r>=0; r--) if(tetBoard[r].every(x=>x!==0)) { tetBoard.splice(r,1); tetBoard.unshift(Array(10).fill(0)); l++; r++; }
            if(l>0) { mgScore+=l*100; mgCoins+=l; document.getElementById('game-score').innerText=mgScore; document.getElementById('game-coins').innerText=mgCoins; }
            spawnTetPiece();
        }
        function tetLoop() {
            if(!mgActive) return; ctx.clearRect(0,0, canvas.width, canvas.height); tetFrames++;
            if(tetFrames > 30 - Math.min(25, Math.floor(mgScore/200))) { tetFrames=0; if(tetCol(0,1)) tetMerge(); else tetY++; }
            let ox = (canvas.width-(10*tetScale))/2, oy = (canvas.height-(20*tetScale))/2 - 30; ctx.save(); ctx.translate(ox, oy); ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0,0,10*tetScale, 20*tetScale);
            for(let r=0; r<20; r++) for(let c=0; c<10; c++) if(tetBoard[r][c]) { ctx.fillStyle=tetBoard[r][c]; ctx.fillRect(c*tetScale+1, r*tetScale+1, tetScale-2, tetScale-2); }
            for(let r=0; r<tetPiece.s.length; r++) for(let c=0; c<tetPiece.s[r].length; c++) if(tetPiece.s[r][c]) { ctx.fillStyle=tetPiece.c; ctx.fillRect((tetX+c)*tetScale+1, (tetY+r)*tetScale+1, tetScale-2, tetScale-2); }
            ctx.restore(); mgReq = requestAnimationFrame(tetLoop);
        }

        // ================= 7. CORRIDA TURBO =================
        let rcRoadY = 0, rcObs = [], rcFrames = 0;
        function initRacing() { rcPlayer.x = canvas.width/2 - rcPlayer.w/2; rcObs = []; rcFrames = 0; rcLoop(); }
        function rcLoop() {
            if(!mgActive) return; ctx.clearRect(0,0,canvas.width,canvas.height); rcFrames++;
            
            if(keys.left) rcPlayer.x -= 9; if(keys.right) rcPlayer.x += 9;
            rcPlayer.x = Math.max(0, Math.min(rcPlayer.x, canvas.width - rcPlayer.w));

            ctx.fillStyle = '#475569'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.fillStyle = '#cbd5e1'; rcRoadY = (rcRoadY + 5) % 40;
            for(let i=-40; i<canvas.height; i+=40) { ctx.fillRect(canvas.width/4, i+rcRoadY, 4, 20); ctx.fillRect(canvas.width*0.75, i+rcRoadY, 4, 20); }
            drawLighterAvatar(rcPlayer.x, rcPlayer.y, rcPlayer.w, rcPlayer.h);
            mgScore++; if(mgScore % 500 === 0) { mgCoins++; document.getElementById('game-coins').innerText = mgCoins; } document.getElementById('game-score').innerText = mgScore;
            if(rcFrames % Math.max(25, 60 - Math.floor(mgScore/100)) === 0) { rcObs.push({x: Math.random()*(canvas.width-30), y: -50, w: 30, h: 46, s: 6 + (mgScore/1000)}); }
            for(let i=rcObs.length-1; i>=0; i--) {
                rcObs[i].y += rcObs[i].s; drawLighterAvatar(rcObs[i].x, rcObs[i].y, rcObs[i].w, rcObs[i].h, '#ef4444');
                if(rcPlayer.x < rcObs[i].x+rcObs[i].w && rcPlayer.x+rcPlayer.w > rcObs[i].x && rcPlayer.y < rcObs[i].y+rcObs[i].h && rcPlayer.y+rcPlayer.h > rcObs[i].y) { triggerGameOver(); return; }
                if(rcObs[i].y > canvas.height) rcObs.splice(i,1);
            }
            mgReq = requestAnimationFrame(rcLoop);
        }

        // ================= 8. COBRINHA =================
        let snkArr, snkFood, snkSize = 20, snkFrames = 0;
        function initSnake() { snkArr = [{x: 5, y: 5}]; snkDir = 'RIGHT'; spawnSnkFood(); snkFrames=0; snkLoop(); }
        function spawnSnkFood() { snkFood = {x: Math.floor(Math.random()*(canvas.width/snkSize)), y: Math.floor(Math.random()*((canvas.height-120)/snkSize))}; }
        function snkLoop() {
            if(!mgActive) return; ctx.clearRect(0,0,canvas.width,canvas.height); snkFrames++;
            ctx.fillStyle = '#1e293b'; ctx.fillRect(0,0,canvas.width,canvas.height); 
            if(snkFrames % 8 === 0) {
                let head = {x: snkArr[0].x, y: snkArr[0].y};
                if(snkDir==='UP') head.y--; else if(snkDir==='DOWN') head.y++; else if(snkDir==='LEFT') head.x--; else if(snkDir==='RIGHT') head.x++;
                if(head.x < 0 || head.x >= Math.floor(canvas.width/snkSize) || head.y < 0 || head.y >= Math.floor((canvas.height-120)/snkSize)) { triggerGameOver(); return; }
                for(let p of snkArr) if(head.x === p.x && head.y === p.y) { triggerGameOver(); return; }
                snkArr.unshift(head);
                if(head.x === snkFood.x && head.y === snkFood.y) { mgScore++; if(mgScore%2===0) mgCoins++; document.getElementById('game-score').innerText=mgScore; document.getElementById('game-coins').innerText=mgCoins; spawnSnkFood(); } else snkArr.pop();
            }
            ctx.fillStyle = '#3b82f6'; ctx.beginPath(); ctx.arc(snkFood.x*snkSize+snkSize/2, snkFood.y*snkSize+snkSize/2, snkSize/2 - 2, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#22c55e'; for(let p of snkArr) { ctx.beginPath(); ctx.roundRect(p.x*snkSize+1, p.y*snkSize+1, snkSize-2, snkSize-2, 4); ctx.fill(); }
            mgReq = requestAnimationFrame(snkLoop);
        }

        // --- BOTOES VIRTUAIS ---
        function btnLeft(e) { if(e) e.preventDefault(); if(activeMinigame==='tetris' && !tetCol(-1,0)) tetX--; if(activeMinigame==='snake' && snkDir!=='RIGHT') snkDir='LEFT'; }
        function btnRight(e) { if(e) e.preventDefault(); if(activeMinigame==='tetris' && !tetCol(1,0)) tetX++; if(activeMinigame==='snake' && snkDir!=='LEFT') snkDir='RIGHT'; }
        function btnUp(e) { if(e) e.preventDefault(); if(activeMinigame==='tetris') { let ns = tetPiece.s[0].map((v, i) => tetPiece.s.map(r => r[i]).reverse()); if(!tetCol(0,0,ns)) tetPiece.s = ns; } if(activeMinigame==='snake' && snkDir!=='DOWN') snkDir='UP'; }
        function btnDown(e) { if(e) e.preventDefault(); if(activeMinigame==='tetris') { while(!tetCol(0,1)) tetY++; tetMerge(); tetFrames=0; } if(activeMinigame==='snake' && snkDir!=='UP') snkDir='DOWN'; }

        initGame();
    </script>
